<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DC Heroes — Añadí tu super | Programación II</title>
    <link rel="stylesheet" href="css/formularios.css" />
  </head>

  <body>
    <div class="page-shell">
      <div class="top-bar">Descuentos 20%</div>

      <header class="brand-header">
        <p class="brand-title">DC Heroes</p>
      </header>

      <nav class="main-nav" aria-label="Principal">
        <a href="#">Contacto</a>
        <a href="formularios.html">Registrarme</a>
        <a href="#">Ingresar</a>
      </nav>

      <main class="page-main">
        <section class="form-panel">
          <h1>Añadí tu super!</h1>
          <p class="form-text">Agregá tu personaje favorito completando las opciones.</p>

          <form action="#" method="post" enctype="multipart/form-data">
            <div class="form-grid">
              <div class="field">
                <label for="nombre">*Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre" required />
              </div>

              <div class="field">
                <label for="especie">*Especie</label>
                <select id="especie" name="especie" required>
                  <option value="" selected disabled>Especie</option>
                  <option value="humano">Humano</option>
                  <option value="unknown">Unknown</option>
                  <option value="alienigena">Alienígena</option>
                  <option value="metahumano">Metahumano</option>
                </select>
              </div>

              <div class="field">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" />
              </div>

              <div class="field">
                <label for="foto">Agregar Foto</label>
                <input type="file" id="foto" name="foto" accept="image/png, image/jpeg, image/webp" />
              </div>

              <div class="field descripcion">
                <label for="descripcion" class="sr-only">Descripción</label>
                <textarea id="descripcion" name="descripcion" placeholder="Descripción"></textarea>
              </div>

              <div class="options">
                <fieldset class="poderes">
                  <legend>Poderes</legend>

                  <label>
                    <input type="checkbox" name="poderes" value="volar" />
                    Volar
                  </label>

                  <label>
                    <input type="checkbox" name="poderes" value="superinteligencia" />
                    SuperInteligencia
                  </label>

                  <label>
                    <input type="checkbox" name="poderes" value="vista-de-rayo-laser" />
                    Vista de rayo láser
                  </label>

                  <label>
                    <input type="checkbox" name="poderes" value="billetera-gorda" />
                    Billetera gorda
                  </label>
                </fieldset>

                <fieldset class="tipo-personaje">
                  <legend>Tipo de personaje</legend>

                  <label>
                    <input type="radio" name="tipo-personaje" value="heroe" />
                    Héroe / Heroina
                  </label>

                  <label>
                    <input type="radio" name="tipo-personaje" value="villano" />
                    Villano / Villana
                  </label>
                </fieldset>
              </div>
            </div>

            <button type="submit">Añadir</button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>Todos los derechos reservados - LUCAS PEREZ</p>
        <a href="https://github.com/" class="footer-github">GitHub</a>
      </footer>
    </div>
  </body>
</html>
