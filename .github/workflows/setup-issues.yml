# Crea issues de la actividad para repos generados desde GitHub Classroom.
# Idempotente: solo crea issues cuyo título aún no existe.
name: Setup assignment issues

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: setup-issues-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ensure-assignment-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Crear issues faltantes de la actividad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import json
          import os
          import textwrap
          import urllib.error
          import urllib.parse
          import urllib.request

          REPO = os.environ["GITHUB_REPOSITORY"]
          TOKEN = os.environ["GITHUB_TOKEN"]
          API = "https://api.github.com"
          ISSUE_LABEL = "classroom-assignment"

          ISSUES = [
              {
                  "title": "[Entrega] Archivos base del formulario",
                  "body": """
          ## Objetivo
          Partir de la estructura mínima del proyecto y de los recursos gráficos.

          ## Qué debe cumplirse
          - [ ] `formularios.html` en la raíz (pantalla evaluada).
          - [ ] `css/formularios.css` con los estilos del formulario.
          - [ ] Carpeta `img/` creada por vos con al menos un archivo exportado desde Figma (ver README).

          ## Nota
          La pantalla `index.html` sirve como puente desde el ejercicio de Box Model y **no** suma puntos en los tests.""",
              },
              {
                  "title": "[Requisito] Enlazar la hoja de estilos del formulario",
                  "body": """
          ## Objetivo
          Mantener HTML y CSS separados.

          ## Qué debe cumplirse
          - [ ] `formularios.html` incluye `<link rel="stylesheet" href="css/formularios.css" />` (o equivalente con comillas simples).""",
              },
              {
                  "title": "[Requisito] Cascarón semántico (header, nav, main, footer)",
                  "body": """
          ## Objetivo
          Replicar la jerarquía de la maqueta con etiquetas semánticas.

          ## Qué debe cumplirse
          - [ ] `header` para la franja de marca.
          - [ ] `nav` para los accesos Contacto / Registrarme / Ingresar.
          - [ ] `main` envolviendo el formulario.
          - [ ] `footer` con el texto de derechos y el acceso a GitHub (enlace y/o imagen exportada a `img/`, según Figma).""",
              },
              {
                  "title": "[Requisito] Formulario accesible y método POST",
                  "body": """
          ## Objetivo
          Construir el envío del alta de personaje.

          ## Qué debe cumplirse
          - [ ] Un único `<form>` agrupa los campos.
          - [ ] `method="post"` (puede usarse `action=\"#\"` mientras no haya backend).
          - [ ] Botón visible con el texto **Añadir** y `type=\"submit\"`.""",
              },
              {
                  "title": "[Requisito] Campos obligatorios (nombre y especie)",
                  "body": """
          ## Objetivo
          Marcar en HTML los datos imprescindibles, tal como indica Figma con asterisco.

          ## Qué debe cumplirse
          - [ ] `input` de nombre con `id=\"nombre\"` y atributo `required`.
          - [ ] `select` de especie con `id=\"especie\"` y atributo `required`.""",
              },
              {
                  "title": "[Requisito] Controles HTML5 (fecha, archivo, descripción)",
                  "body": """
          ## Objetivo
          Practicar los inputs especializados del estándar HTML5.

          ## Qué debe cumplirse
          - [ ] Fecha con `<input type=\"date\">`.
          - [ ] Foto con `<input type=\"file\">` (acepta imágenes si querés usar `accept`).
          - [ ] Descripción con `<textarea>`.""",
              },
              {
                  "title": "[Requisito] Poderes con fieldset y checkboxes",
                  "body": """
          ## Objetivo
          Agrupar opciones múltiples relacionadas.

          ## Qué debe cumplirse
          - [ ] `<fieldset>` + `<legend>Poderes</legend>`.
          - [ ] Cuatro `<input type=\"checkbox\">` para Volar, SuperInteligencia, Vista de rayo láser y Billetera gorda.""",
              },
              {
                  "title": "[Requisito] Tipo de personaje (radio buttons)",
                  "body": """
          ## Objetivo
          Forzar una única categoría por personaje.

          ## Qué debe cumplirse
          - [ ] Dos radios: Héroe / Heroina y Villano / Villana.
          - [ ] Ambos comparten `name=\"tipo-personaje\"` para que el navegador los trate como grupo exclusivo.""",
              },
              {
                  "title": "[Requisito] Textos literales de la maqueta",
                  "body": """
          ## Objetivo
          Mantener la coherencia con el diseño de referencia.

          ## Qué debe cumplirse
          - [ ] Titular **Añadí tu super!** (respetá tilde y signos).
          - [ ] Párrafo guía **Agregá tu personaje favorito completando las opciones.**""",
              },
              {
                  "title": "[Requisito] CSS del panel (layout y radios)",
                  "body": """
          ## Objetivo
          Traducir el panel azul a CSS con buenas prácticas de layout.

          ## Qué debe cumplirse
          - [ ] Usar `display: flex` o `display: grid` para las columnas del formulario.
          - [ ] Aplicar `border-radius` al panel y a los campos.
          - [ ] Añadir `padding` o `gap` para separar bloques.

          ## Referencia cromática (desde Figma)
          - Barra de descuentos y botón principal: `#1cd1b0`.
          - Azules principales: `#00669f`, `#001d2d`.""",
              },
              {
                  "title": "[Revisión docente] Fidelidad visual y navegación desde Home",
                  "body": """
          ## Objetivo
          Completar la corrección más allá de los tests automáticos.

          ## Checklist sugerida para el docente
          - [ ] Comparación con el frame **Añadir** del archivo de Figma.
          - [ ] Estados hover/focus razonables.
          - [ ] La pantalla `index.html` mantiene el botón flotante **+** hacia `formularios.html` (continuidad pedagógica con Box Model).
          - [ ] Datos personales reemplazando `[TU NOMBRE Y APELLIDO]`.

          ## Nota
          Los tests de GitHub Classroom **no sustituyen** esta revisión.""",
              },
          ]

          for _spec in ISSUES:
              _spec["body"] = textwrap.dedent(_spec["body"]).strip()

          def request(method, url, data=None):
              headers = {
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              body = None
              if data is not None:
                  headers["Content-Type"] = "application/json; charset=utf-8"
                  body = json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=body, method=method, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          def list_existing_issue_titles():
              titles = set()
              page = 1
              while True:
                  url = f"{API}/repos/{REPO}/issues?state=all&per_page=100&page={page}"
                  headers = {
                      "Authorization": f"Bearer {TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  }
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      batch = json.loads(resp.read().decode())
                  if not batch:
                      break
                  for item in batch:
                      if item.get("pull_request") is None:
                          title = item.get("title", "").strip()
                          if title:
                              titles.add(title)
                  if len(batch) < 100:
                      break
                  page += 1
              return titles

          def ensure_label_exists(label_name):
              url = f"{API}/repos/{REPO}/labels/{urllib.parse.quote(label_name)}"
              try:
                  request("GET", url)
                  return
              except urllib.error.HTTPError as e:
                  if e.code != 404:
                      raise
              request(
                  "POST",
                  f"{API}/repos/{REPO}/labels",
                  {
                      "name": label_name,
                      "color": "1d76db",
                      "description": "Issue generado automáticamente para la actividad de Classroom",
                  },
              )
              print(f"Etiqueta creada: {label_name}")

          existing_titles = list_existing_issue_titles()
          ensure_label_exists(ISSUE_LABEL)

          created_count = 0
          skipped_count = 0
          for spec in ISSUES:
              if spec["title"] in existing_titles:
                  skipped_count += 1
                  print("Ya existe, se omite: " + spec["title"])
                  continue
              url = f"{API}/repos/{REPO}/issues"
              created = request(
                  "POST",
                  url,
                  {"title": spec["title"], "body": spec["body"], "labels": [ISSUE_LABEL]},
              )
              created_count += 1
              print("Creado issue #" + str(created["number"]) + ": " + spec["title"])
          print(
              "Listo: "
              + str(created_count)
              + " issue(s) creado(s), "
              + str(skipped_count)
              + " ya existentes."
          )
          PY
